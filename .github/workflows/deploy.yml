name: Deploy

on:
  push:
    branches: [main]

# Deploys run one at a time: two merges in quick succession would otherwise
# race their SSH sessions on the droplet (concurrent `docker compose up`,
# interleaved rollback tagging). Queued runs wait instead of cancelling so
# every merge still ships in order.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/24p-web

jobs:
  # The PR-triggered CI workflow checks the merge ref, not the commit that
  # lands on main (direct pushes skip it entirely; a stale merge ref can pass
  # while the merged tree fails). Nothing ships without passing here.
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: 24p_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run tsc --noEmit

      - name: Test
        run: bun test
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/24p_test

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve image tag
        id: meta
        run: echo "tag=latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          # Push :latest (what prod runs) plus an immutable :<sha> tag so a bad
          # deploy can be rolled back by setting IMAGE_TAG=<sha> and re-running
          # `docker compose up -d` — these live in GHCR, not on the server disk.
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          # NEXT_PUBLIC_* values are inlined into the client bundle at build
          # time — runtime env on the server cannot change them.
          build-args: |
            NEXT_PUBLIC_APP_URL=https://24p.mov
            NEXT_PUBLIC_AUTH_CALLBACK_URL=https://24p.mov
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy-prod:
    name: Deploy to prod (24p.mov)
    runs-on: ubuntu-latest
    needs: build
    # Without packages:read the GITHUB_TOKEN can't pull the private GHCR image,
    # so `docker compose pull` on prod was denied on every run.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Write env file
        run: |
          cat > .env <<'EOF'
          IMAGE_TAG=latest
          NEXTAUTH_SECRET=${{ secrets.PROD_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=https://24p.mov
          NEXT_PUBLIC_APP_URL=https://24p.mov
          NEXT_PUBLIC_AUTH_CALLBACK_URL=https://24p.mov
          GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          TMDB_API_KEY=${{ secrets.PROD_TMDB_API_KEY }}
          DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
          DB_SSLMODE=${{ secrets.PROD_DB_SSLMODE }}
          DB_CA_CERT_BASE64=${{ secrets.PROD_DB_CA_CERT_BASE64 }}
          DB_CERT_FINGERPRINT_SHA256=${{ secrets.PROD_DB_CERT_FINGERPRINT_SHA256 }}
          ADMIN_EMAILS=${{ secrets.PROD_ADMIN_EMAILS }}
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OMDB_API_KEY=${{ secrets.OMDB_API_KEY }}
          EOF
          chmod 600 .env

      - name: Copy files to prod server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.env"
          target: /opt/24p/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            # Health-gated deploy with rollback. `docker compose up` recreates the
            # single web container in place, so a NEW container that fails to start
            # is a live outage, not a no-op — the old one is already gone. If the
            # new container never serves 200 we restore the previous image so prod
            # is never left down. (A failed pull, by contrast, never touches the
            # running container, so we just fail fast and leave prod as-is.)
            set -eo pipefail
            cd /opt/24p
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Image the currently-running web container uses; empty on first deploy.
            prev_image=$(docker inspect --format '{{.Image}}' "$(docker compose ps -q web 2>/dev/null)" 2>/dev/null || true)
            echo "running image before deploy: ${prev_image:-<none>}"

            # Pull up front (does not disturb the running container), then cut
            # over. `timeout` bounds the cutover: a wedged container removal once
            # hung `compose up` indefinitely and served 502 until Docker was
            # restarted — better to fail fast and let the health gate roll back.
            docker compose pull web
            pulled_digest=$(docker inspect --format '{{.Id}}' ${{ env.IMAGE_WEB }}:latest)
            timeout 180 docker compose up -d --remove-orphans || echo "compose up exited non-zero or timed out; health gate will decide"

            # The deploy is only a success once the new container serves 200.
            code=000
            for i in $(seq 1 18); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ || true)
              if [ "$code" = "200" ]; then echo "smoke test ok after $((i * 5))s"; break; fi
              echo "waiting for app to come up ($i/18): got $code"; sleep 5
            done

            if [ "$code" != "200" ]; then
              echo "::error::post-deploy smoke test failed (last status: $code)"
              docker compose logs --tail=80 web || true
              if [ -n "$prev_image" ]; then
                echo "rolling back to previous image $prev_image"
                docker tag "$prev_image" ${{ env.IMAGE_WEB }}:latest
                timeout 180 docker compose up -d --force-recreate --remove-orphans || true
                sleep 8
                echo "status after rollback: $(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)"
              else
                echo "no previous image recorded — cannot auto-roll back"
              fi
              exit 1
            fi

            # A 200 alone can come from the OLD container when the cutover
            # wedged (compose up timed out with the old one still running), so
            # verify the serving container runs the freshly pulled image. Prod
            # is still up on the previous image in that case — fail the job
            # without touching it.
            running_image=$(docker inspect --format '{{.Image}}' "$(docker compose ps -q web 2>/dev/null)" 2>/dev/null || true)
            if [ "$running_image" != "$pulled_digest" ]; then
              echo "::error::running image ($running_image) is not the pulled image ($pulled_digest) — cutover did not happen; prod still serves the previous build"
              exit 1
            fi

            # Readiness probe. The smoke test above only proves the app serves
            # `/` (which renders without a DB round-trip), so a DB outage would
            # pass it silently. Check DB reachability too — but a DB outage does
            # NOT justify rolling back the app image (rollback can't fix the DB
            # and would block shipping app fixes), so warn loudly instead of
            # failing. Real paging comes from an external monitor on /api/health.
            ready=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/api/health || true)
            if [ "$ready" = "200" ]; then
              echo "readiness ok: /api/health 200 (DB reachable)"
            else
              echo "::warning::readiness degraded: /api/health returned $ready — app is up but DB-backed features will 500; investigate the database, not this deploy"
            fi

            # Success. Tag the outgoing image so it survives pruning — an
            # untagged previous image is dangling and `image prune` would
            # delete exactly the local fast-rollback copy the comment below
            # promises (rollback: IMAGE_TAG=previous, `docker compose up -d`).
            if [ -n "$prev_image" ] && [ "$prev_image" != "$pulled_digest" ]; then
              docker tag "$prev_image" ${{ env.IMAGE_WEB }}:previous
            fi
            docker image prune -f
            docker builder prune -f --filter 'until=168h' || true

