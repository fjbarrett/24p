name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/24p-web

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: meta
        run: echo "tag=latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy-prod:
    name: Deploy to prod (24p.mov)
    runs-on: ubuntu-latest
    needs: build
    # Without packages:read the GITHUB_TOKEN can't pull the private GHCR image,
    # so `docker compose pull` on prod was denied on every run.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Write env file
        run: |
          cat > .env <<'EOF'
          IMAGE_TAG=latest
          NEXTAUTH_SECRET=${{ secrets.PROD_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=https://24p.mov
          NEXT_PUBLIC_APP_URL=https://24p.mov
          NEXT_PUBLIC_AUTH_CALLBACK_URL=https://24p.mov
          GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          TMDB_API_KEY=${{ secrets.PROD_TMDB_API_KEY }}
          DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF
          chmod 600 .env

      - name: Copy files to prod server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.env"
          target: /opt/24p/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            # Fail loudly on any error (incl. a failed `docker compose pull`).
            # Previously the trailing prune masked pull failures, so deploys
            # reported success while prod stayed on a stale image.
            set -eo pipefail
            cd /opt/24p
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

