name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/24p-web

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: meta
        run: echo "tag=latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          # Push :latest (what prod runs) plus an immutable :<sha> tag so a bad
          # deploy can be rolled back by setting IMAGE_TAG=<sha> and re-running
          # `docker compose up -d` — these live in GHCR, not on the server disk.
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy-prod:
    name: Deploy to prod (24p.mov)
    runs-on: ubuntu-latest
    needs: build
    # Without packages:read the GITHUB_TOKEN can't pull the private GHCR image,
    # so `docker compose pull` on prod was denied on every run.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Write env file
        run: |
          cat > .env <<'EOF'
          IMAGE_TAG=latest
          NEXTAUTH_SECRET=${{ secrets.PROD_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=https://24p.mov
          NEXT_PUBLIC_APP_URL=https://24p.mov
          NEXT_PUBLIC_AUTH_CALLBACK_URL=https://24p.mov
          GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          TMDB_API_KEY=${{ secrets.PROD_TMDB_API_KEY }}
          DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF
          chmod 600 .env

      - name: Copy files to prod server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          source: "docker-compose.yml,.env"
          target: /opt/24p/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            # Health-gated deploy with rollback. `docker compose up` recreates the
            # single web container in place, so a NEW container that fails to start
            # is a live outage, not a no-op — the old one is already gone. If the
            # new container never serves 200 we restore the previous image so prod
            # is never left down. (A failed pull, by contrast, never touches the
            # running container, so we just fail fast and leave prod as-is.)
            set -eo pipefail
            cd /opt/24p
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Image the currently-running web container uses; empty on first deploy.
            prev_image=$(docker inspect --format '{{.Image}}' "$(docker compose ps -q web 2>/dev/null)" 2>/dev/null || true)
            echo "running image before deploy: ${prev_image:-<none>}"

            # Pull up front (does not disturb the running container), then cut over.
            docker compose pull web
            docker compose up -d --remove-orphans || echo "compose up exited non-zero; health gate will decide"

            # The deploy is only a success once the new container serves 200.
            code=000
            for i in $(seq 1 18); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ || true)
              if [ "$code" = "200" ]; then echo "smoke test ok after $((i * 5))s"; break; fi
              echo "waiting for app to come up ($i/18): got $code"; sleep 5
            done

            if [ "$code" != "200" ]; then
              echo "::error::post-deploy smoke test failed (last status: $code)"
              docker compose logs --tail=80 web || true
              if [ -n "$prev_image" ]; then
                echo "rolling back to previous image $prev_image"
                docker tag "$prev_image" ${{ env.IMAGE_WEB }}:latest
                docker compose up -d --force-recreate --remove-orphans || true
                sleep 8
                echo "status after rollback: $(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/ || true)"
              else
                echo "no previous image recorded — cannot auto-roll back"
              fi
              exit 1
            fi

            # Success. Prune only dangling images + week-old build cache; keep the
            # previous image around so a fast manual rollback stays possible, and
            # avoid nuking reusable layers on every deploy.
            docker image prune -f
            docker builder prune -f --filter 'until=168h' || true

