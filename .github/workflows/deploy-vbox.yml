name: Deploy VBox

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/24p-web

jobs:
  deploy:
    name: Deploy to VBox
    runs-on: [self-hosted, linux, x64, 24p-vbox]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write env file
        run: |
          install -d -m 700 /opt/24p
          cat > /opt/24p/.env <<'EOF'
          NEXTAUTH_SECRET=${{ secrets.VBOX_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.VBOX_NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL=${{ secrets.VBOX_NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_AUTH_CALLBACK_URL=${{ secrets.VBOX_NEXT_PUBLIC_AUTH_CALLBACK_URL }}
          GOOGLE_CLIENT_ID=${{ secrets.VBOX_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.VBOX_GOOGLE_CLIENT_SECRET }}
          TMDB_API_KEY=${{ secrets.VBOX_TMDB_API_KEY }}
          DATABASE_URL=${{ secrets.VBOX_DATABASE_URL }}
          POSTGRES_USER=${{ secrets.VBOX_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.VBOX_POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.VBOX_POSTGRES_DB }}
          EOF
          chmod 600 /opt/24p/.env

      - name: Deploy stack
        working-directory: ${{ github.workspace }}
        run: |
          docker compose pull web db
          docker compose up -d
          docker system prune -f
