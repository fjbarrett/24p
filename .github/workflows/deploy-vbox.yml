name: Deploy VBox

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/24p-web

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to VBox
    runs-on: [self-hosted, linux, x64, 24p-vbox]
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write env file
        working-directory: ${{ github.workspace }}
        run: |
          cat > .env <<'EOF'
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          NEXTAUTH_SECRET=${{ secrets.VBOX_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.VBOX_NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL=${{ secrets.VBOX_NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_AUTH_CALLBACK_URL=${{ secrets.VBOX_NEXT_PUBLIC_AUTH_CALLBACK_URL }}
          GOOGLE_CLIENT_ID=${{ secrets.VBOX_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.VBOX_GOOGLE_CLIENT_SECRET }}
          TMDB_API_KEY=${{ secrets.VBOX_TMDB_API_KEY }}
          DATABASE_URL=${{ secrets.VBOX_DATABASE_URL }}
          POSTGRES_USER=${{ secrets.VBOX_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.VBOX_POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.VBOX_POSTGRES_DB }}
          EOF
          chmod 600 .env

      - name: Deploy stack
        working-directory: ${{ github.workspace }}
        run: |
          docker compose --profile local pull
          docker compose --profile local up -d --remove-orphans
          docker system prune -f
