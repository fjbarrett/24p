name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run tsc --noEmit

      # Mirrors the production Docker build so prerender / RSC-boundary errors
      # are caught in CI instead of first surfacing during a deploy.
      - name: Build
        run: bun run build -- --webpack
        env:
          NEXT_TELEMETRY_DISABLED: "1"
