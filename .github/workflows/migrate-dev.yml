name: Run migrations on dev DB

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply migrations 004 + 005 to dev database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run migration 004
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: psql "$DATABASE_URL" -f migrations/004_streaming_notifications.sql

      - name: Run migration 005
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: psql "$DATABASE_URL" -f migrations/005_price_notifications.sql
