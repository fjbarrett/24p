# Origin vhost for 24p.mov — versioned copy of /etc/nginx/sites-available/24p-mov.
# Installed by scripts/server/harden-origin.sh.
#
# Hardening properties:
#  - Real client IPs come only from Cloudflare's ranges (cloudflare-real-ip.conf);
#    CF-Connecting-IP is then OVERWRITTEN with the resolved $remote_addr before
#    proxying, so the app never sees a caller-supplied value.
#  - Port 80 redirects to HTTPS instead of proxying plaintext to the app.
#  - UFW additionally restricts 80/443 to Cloudflare ranges, so direct-origin
#    requests never reach nginx at all.

server {
    server_name 24p.mov www.24p.mov;

    include /etc/nginx/conf.d/cloudflare-real-ip.conf;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        # $remote_addr is post-realip: the true client IP for Cloudflare
        # traffic, the direct caller's own IP for anything else.
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/24p.mov/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/24p.mov/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name 24p.mov www.24p.mov;
    return 301 https://$host$request_uri;
}
