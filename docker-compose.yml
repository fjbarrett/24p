services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [local]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-24p}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-24p}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/fjbarrett/24p-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_AUTH_CALLBACK_URL: ${NEXT_PUBLIC_AUTH_CALLBACK_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required (32+ random bytes; generate with: openssl rand -base64 32)}"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRAWBERRY_BASE_URL: ${STRAWBERRY_BASE_URL:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/24p}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-}
      DB_SSLMODE: ${DB_SSLMODE:-}
      DB_CA_CERT_BASE64: ${DB_CA_CERT_BASE64:-}
      DB_CERT_FINGERPRINT_SHA256: ${DB_CERT_FINGERPRINT_SHA256:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OMDB_API_KEY: ${OMDB_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
        required: false
    healthcheck:
      # `/` renders without a DB round-trip for anonymous requests, so this is a
      # cheap liveness probe. start_period covers startup + migrations.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  db-data:
