services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: [local]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-24p}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-24p}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/fjbarrett/24p-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_AUTH_CALLBACK_URL: ${NEXT_PUBLIC_AUTH_CALLBACK_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRAWBERRY_BASE_URL: ${STRAWBERRY_BASE_URL:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/24p}
    depends_on:
      db:
        condition: service_healthy
        required: false
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  db-data:
